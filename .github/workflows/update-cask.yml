name: Update cask on new release

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v prefix)'
        required: true

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Download DMG and compute SHA256
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          curl -sL "https://github.com/Mateuscruz19/BAT-Torrent/releases/download/v${VERSION}/BATorrent-macos-arm64.dmg" -o bat.dmg
          SHA=$(shasum -a 256 bat.dmg | awk '{print $1}')
          echo "SHA256=${SHA}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Update cask
        run: |
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/batorrent.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/batorrent.rb
          cat Casks/batorrent.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/batorrent.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update BATorrent to v${VERSION}"
          git push
